apiVersion: v1
kind: ConfigMap
metadata:
  name: haproxy-config
  namespace: photostudio-ns
data:
  haproxy.cfg: |
    defaults
        timeout connect 5s
        timeout client  30s
        timeout server  30s

    frontend http_front
        bind *:8080
        default_backend app_backend

    backend app_backend
        balance roundrobin
        server app1 photostudio-service:3000 check